version: "2"
sql:
  - engine: "postgresql"
    schema: "internal/adapters/postgres/migrations"
    queries: "internal/adapters/postgres/queries"
    gen:
      go:
        package: "db"
        out: "internal/adapters/postgres/generated"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
